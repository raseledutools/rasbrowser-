name: 🚀 FamilyBrowser CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  # Manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  contents: write
  actions: read

jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1: BUILD DEBUG APK (every push)
  # ═══════════════════════════════════════════════════════════
  build-debug:
    name: 🔨 Build Debug APK
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_type == 'debug'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 🏗️ Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FamilyBrowser-Debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ═══════════════════════════════════════════════════════════
  # JOB 2: BUILD RELEASE APK (main branch or manual trigger)
  # ═══════════════════════════════════════════════════════════
  build-release:
    name: 🏆 Build Release APK
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Grant Gradle execute permission
        run: chmod +x gradlew

      - name: 📦 Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Decode keystore from GitHub Secret ──────────────────
      - name: 🔑 Decode Release Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          echo "Keystore decoded ✅"

      # ── Build signed release (if keystore available) ─────────
      - name: 🏗️ Build Release APK (Signed)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon --stacktrace

      # ── Build unsigned release (if no keystore) ──────────────
      - name: 🏗️ Build Release APK (Unsigned)
        if: env.KEYSTORE_BASE64 == ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FamilyBrowser-Release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Build AAB for Play Store ──────────────────────────────
      - name: 📦 Build Release AAB (Play Store)
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: 📤 Upload AAB
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: FamilyBrowser-AAB-${{ github.run_number }}
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # JOB 3: AUTO RELEASE (on version tag push)
  # Push a tag like: git tag v1.0.0 && git push origin v1.0.0
  # ═══════════════════════════════════════════════════════════
  create-github-release:
    name: 🎉 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: 🔧 Grant execute permission
        run: chmod +x gradlew

      - name: 🔑 Decode Keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore

      - name: 🏗️ Build Release APK + AAB
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Xmx4g"
        run: |
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "FamilyBrowser ${{ github.ref_name }}"
          body: |
            ## 🚀 FamilyBrowser ${{ github.ref_name }}

            ### ✅ What's included
            - `FamilyBrowser-release.apk` — Install directly on Android
            - `FamilyBrowser-release.aab` — Upload to Google Play Store

            ### 📱 Install APK
            1. Download the APK
            2. Enable "Install unknown apps" on your Android device
            3. Open and install

            ### 🛡️ Features
            - Ad Blocker + Tracker Blocker
            - Adult Content Filter with PIN
            - Multi-Tab (Chrome style)
            - Multi-Profile + Kids Mode
            - YouTube Background Play
            - Download Manager
            - Dark Mode + Reader Mode
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
